[tools]
cmake = "latest"
python = "3.14"

[env]
_.python.venv = { path = "venv", create = true }

[tasks.setup]
run = "git submodule update --init --recursive"

[tasks.build_cpp]
run = "cmake -S . -B build && cmake --build build && ./build/pos_backend"
depends = ["setup"]

[tasks.build]
run = "cmake -S . -B build && cmake --build build && src/python/main.py"
